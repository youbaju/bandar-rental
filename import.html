  let currentUser = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    currentUser = user;
    await checkStatus();
  });

  async function checkStatus() {
    const snap = await getDocs(collection(db, "flats"));
    if (!snap.empty) {
      statusBox.textContent = `قاعدة البيانات تحتوي بالفعل على ${snap.size} شقة مسجلة. استيراد البيانات مرة أخرى سينشئ تكراراً. تأكد أولاً إن لم تكن قد استوردت البيانات من قبل.`;
      importBtn.textContent = "استيراد مرة أخرى على أي حال";
    } else {
      statusBox.textContent = `جاهز للاستيراد: ${DATA.flats.length} شقة، ${DATA.renters.length} مستأجرين، ${DATA.rents.length} سجل إيجار.`;
    }
    importBtn.disabled = false;
  }

  importBtn.addEventListener("click", async () => {
    importBtn.disabled = true;
    importBtn.textContent = "جاري الاستيراد...";
    try {
      for (const f of DATA.flats) await addDoc(collection(db, "flats"), f);
      for (const r of DATA.renters) await addDoc(collection(db, "renters"), r);
      for (const r of DATA.rents) await addDoc(collection(db, "rents"), r);
      statusBox.textContent = "تم استيراد جميع البيانات بنجاح ✅";
      importBtn.style.display = "none";
      goAppBtn.style.display = "block";
    } catch (err) {
      statusBox.textContent = "حدث خطأ أثناء الاستيراد: " + err.message;
      importBtn.disabled = false;
      importBtn.textContent = "إعادة المحاولة";
    }
  });

</body>
</html>
