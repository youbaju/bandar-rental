    statusBox.innerHTML = `
      سيتم إضافة <b>${newFlats.length}</b> شقة جديدة وتحديث <b>${updateFlats.length}</b>،<br>
      إضافة <b>${newRenters.length}</b> مستأجر جديد وتحديث <b>${updateRenters.length}</b>،<br>
      وإضافة <b>${newRents.length}</b> سجل إيجار جديد.<br><br>
      لن يتم حذف أو تكرار أي بيانات موجودة بالفعل.
    `;
    importBtn.disabled = false;
  }

  importBtn.addEventListener("click", async () => {
    importBtn.disabled = true;
    importBtn.textContent = "جاري المزامنة...";
    let okCount = 0, skipCount = 0;
    const tasks = [
      ...plan.newFlats.map(f => () => addDoc(collection(db, "flats"), f)),
      ...plan.updateFlats.map(f => () => updateDoc(doc(db, "flats", f.id), f.data)),
      ...plan.newRenters.map(r => () => addDoc(collection(db, "renters"), r)),
      ...plan.updateRenters.map(r => () => updateDoc(doc(db, "renters", r.id), r.data)),
      ...plan.newRents.map(r => () => addDoc(collection(db, "rents"), r)),
    ];

    for (const task of tasks) {
      try {
        await task();
        okCount++;
      } catch (err) {
        // مستند اتضاف بالفعل من محاولة سابقة (مشكلة شبكة مؤقتة) - نتخطاه بأمان
        if (String(err.message || "").includes("already exists")) {
          skipCount++;
        } else {
          statusBox.textContent = `حدث خطأ أثناء المزامنة: ${err.message}`;
          importBtn.disabled = false;
          importBtn.textContent = "إعادة المحاولة";
          return;
        }
      }
    }

    statusBox.textContent = `تمت المزامنة بنجاح ✅ (${okCount} عملية جديدة${skipCount ? `، وتم تخطي ${skipCount} كانت مضافة بالفعل` : ""})`;
    importBtn.style.display = "none";
    goAppBtn.style.display = "block";
  });
</script>

</body>
</html>
